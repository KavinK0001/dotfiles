# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# monitor=,preferred,auto,auto
monitor = eDP-1, preferred, 0x0, 1.25
monitor = HDMI-A-1, preferred, auto-left, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$fileManager = thunar
$menu = wofi --show drun
$browser = brave

################
### XWAYLAND ###
################

xwayland {
    force_zero_scaling = true
}   

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = echo on | doas tee /sys/class/drm/card1-HDMI-A-1/status
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent 
exec-once = hyprsunset
exec-once = waybar & hyprpaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = udisksctl mount -b /dev/disk/by-uuid/58CE2F16CE2EEBC6
exec-once = hypridle
exec-once = cachy-update --tray
exec-once = wl-copy --clear
exec-once = cliphist wipe


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_STYLE_OVERRIDE, kvantum

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 8
    gaps_out = 13

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    dim_special = 0.6

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 20
        passes = 3
	xray = true
        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     4,  default, fade        
    animation = workspacesIn,  1,     4,  default, slide 	
    animation = workspacesOut, 1,     4,  default, slide
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    middle_click_paste = false
    enable_swallow = true
    swallow_regex = ^(kitty|foot|alacritty|floating-foot)$ 
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    repeat_delay = 300
    accel_profile = flat
    force_no_accel = true
    follow_mouse = 1
    
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
	    disable_while_typing = true
    }
}

cursor {
    hide_on_key_press = false
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager

bind = $mainMod, X, togglefloating,
bind = $mainMod, X, resizeactive, exact 70% 70%
bind = $mainMod, X, centerwindow

bind = $mainMod, Space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window to a workspace without switching to it with mainMod + SHIFT + CTRL + [0-9]
bind = $mainMod SHIFT CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT CTRL, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod, A, togglespecialworkspace, magic
bind = $mainMod SHIFT, A, exec, ~/.config/hypr/scripts/scratchpad-toggle-window.sh

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Waybar reload
bind = $mainMod SHIFT, R, exec, pkill waybar; hyprctl dispatch exec waybar

# Hyprlock
bind = $mainMod, backslash, exec, hyprlock

# Toggle focus between monitors
bind = $mainMod, S, focusmonitor, +1

# Send window to other monitor
bind = $mainMod SHIFT, S, movewindow, mon:+1

# Send window to other monitor without switching focus to it 
bind = $mainMod SHIFT CTRL, S, movetoworkspacesilent, 10

# Alt Tab window siwtching
bind = ALT, Tab, cyclenext, prev
bind = ALT, Tab, bringactivetotop

# Clipboard history
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Screenshot
bind = , Print, exec, grimblast --freeze copy area && notify-send "Screenshot" "Copied to clipboard"
bind = SHIFT, Print, exec, grimblast --freeze save area /tmp/screenshot.png && swappy -f /tmp/screenshot.png

# Thundar desktop directory
bind = $mainMod, D, exec, $fileManager ~/Desktop

# Galculator
bind = , XF86Calculator, exec, galculator

# floating foot terminal
bind = $mainMod SHIFT, Return, exec, foot --app-id=floating-foot

# Fullscreen
bind = $mainMod, F, fullscreen, 0 #fulscreen to entire screen
bind = $mainMod SHIFT, F, fullscreenstate, 0 2 #fullsceeenstate of an app but in any window size

# Super + Tab keybind for quickly cycling through workspaces on the current monitor while also including empty workspaces
bind = $mainMod, Tab, workspace, m+1    

# bind for increasing and decreasing volume using the XF86Explorer and XF86HomePage keys respectively
binde = , XF86Explorer, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86HomePage, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# bind for wofi emoji picker
bind = $mainMod, Period, exec, wofi-emoji

# OBS passthrough binds
bind = CTRL + SUPER, R, pass, class:^(com.obsproject.Studio)
bind = ALT, 1, pass, class:^(com.obsproject.Studio)
bind = ALT, 2, pass, class:^(com.obsproject.Studio)
bind = ALT, 3, pass, class:^(com.obsproject.Studio)
bind = ALT, 4, pass, class:^(com.obsproject.Studio)

# Toggle touchpad
bind = $mainMod, T, exec, /home/deadeyegam/.config/hypr/scripts/toggle-touchpad.sh

# Keybind to switch to previous, and next workspace using Super + [,]
binde = $mainMod, bracketleft,  exec, ~/.config/hypr/scripts/workspace_prev.sh
binde = $mainMod, bracketright, exec, ~/.config/hypr/scripts/workspace_next.sh

#bind = $mainMod, bracketleft, workspace, r-1
#bind = $mainMod, bracketright, workspace, r+1

# Keybind to open browser
bind = $mainMod, B, exec, $browser

# Lock then suspend on lid close
bindl = , switch:on:Lid Switch, exec, hyprlock & sleep 1 && systemctl suspend

# Zoom
bindl = $mainMod, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(hyprctl -j getoption cursor:zoom_factor | jq ".float + 1.0")  # Zoom in
bindl = $mainMod, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(hyprctl -j getoption cursor:zoom_factor |  jq "[.float + 1.0, 1.0] | min")  # Zoom out
bindc = $mainMod, mouse:274, exec, hyprctl keyword cursor:zoom_factor 1.0  # Reset

# Power button hibernate
bindl = , XF86PowerOff, exec, hyprlock & sleep 2 && systemctl hibernate

# $mainMod + I,J,K,L to resize window 
binde = $mainMod, L, resizeactive, 50 0
binde = $mainMod, J, resizeactive, -50 0
binde = $mainMod, I, resizeactive, 0 -50
binde = $mainMod, K, resizeactive, 0 50


# Mouse Movement using Keyboard Keys
# WARNING!! Your capslock will not work anymore lol
input {
    kb_options = caps:hyper
}

binde = MOD3, I, exec, ydotool mousemove -- 0 -30
binde = MOD3, K, exec, ydotool mousemove -- 0 30
binde = MOD3, J, exec, ydotool mousemove -- -30 0
binde = MOD3, L, exec, ydotool mousemove -- 30 0
bind = MOD3, U, exec, ydotool click 0xC0
bind = MOD3, O, exec, ydotool click 0xC1



##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Reserve workspaces 1-9 for the built-in display, workspace 10 for HDMI
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:HDMI-A-1, default:true

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

########################
### FLOATING WINDOWS ###
########################

# This section is for putting windowrules for windows that you want to always float.

# Pavucontrol
windowrule {
    name = pavucontrol
    match:class = pavucontrol
    size = 827 468
    float = yes
}

# Galculator
windowrule {
    name = galculator
    match:class = galculator

    float = yes
}

# Floating foot terminal
windowrule {
    name = floating-foot
    match:class = floating-foot
    size = 1238 674
    float = yes
}

# floating hourglass timer app
windowrule {
    name = floating-hourglass
    match:class = com.github.sgpthomas.hourglass
    size = 470 370
    float = yes
}

# floating thunar file operation progress
windowrule {
    name = floating-thunar-progress
    match:title = File Operation Progress
    float = yes
}

# floating mousepad
windowrule {
    name = floating-mousepad
    match:class = org.xfce.mousepad

    float = yes
}

# floating tuned-gui
windowrule {
    name = floating-tuned-gui
    match:class = tuned-gui
    size = 1092 702
    float = yes
}

# floating thunar rename window
# create a window rule that makes sure that all windows with class: thunar and initialClass: thunar and title: anything starting with Rename floats
windowrule {
    name = floating-thunar-rename
    match:class = thunar
    match:title = Rename.*

    float = yes
}

# makes all windows opened in scratchpad float 
windowrule {
    name = floating-magic
    match:workspace = special:magic
    float = yes
    size = monitor_w*0.7 monitor_h*0.7
}